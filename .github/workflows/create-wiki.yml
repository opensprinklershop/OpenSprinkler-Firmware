## Ersteinrichtung über Access Point

Beim ersten Start (oder nach Factory Reset) startet OpenSprinkler im **AP-Modus**:

1. Im WLAN-Netzwerk erscheint **`OS_xxxxxxx`** (x = Gerätespezifisch)
2. Verbinde dich mit diesem Netzwerk
3. Öffne Browser → `192.168.4.1`
4. SSID und Passwort deines Heimnetzwerks eingeben
5. Auf **„Verbinden"** klicken

Nach erfolgreichem Verbinden:
- Controller startet neu im **Station-Modus**
- IP-Adresse mit Taste **B1** anzeigen
- Zugriff über `http://<ip-adresse>`

---

## Kabelgebundenes Ethernet

Ab OpenSprinkler v3.2 ist ein **Ethernet-Modul** (optionales Zubehör) verfügbar:

1. Flachbandkabel des Ethernet-Moduls in den entsprechenden Anschluss stecken (polarisiert)
2. RJ45-Kabel anschließen
3. Modul **vor** dem Einschalten des Controllers anschließen
4. Controller erkennt das Modul automatisch und startet im Ethernet-Modus

---

## WLAN zurücksetzen (ohne Einstellungen zu löschen)

1. Tasten **B3 + B2** gleichzeitig drücken
2. „Auf AP-Modus zurücksetzen?" erscheint
3. Mit **B3** bestätigen
4. Neues WLAN einrichten unter `192.168.4.1`

---

## Statische IP-Adresse einrichten

**Empfohlene Methode:** DHCP-Reservierung am Router (MAC-Adresse → feste IP).

**Alternativ:** In OpenSprinkler Optionen:
- DHCP deaktivieren
- IP-Adresse, Gateway und DNS manuell eintragen

---

