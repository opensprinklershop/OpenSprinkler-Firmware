Mit dem **Remote-Sensor** können Sensordaten eines entfernten OpenSprinklers im lokalen Controller verwendet werden — als wären es lokale Sensoren.

---

## Voraussetzung

- Beide OpenSprinkler-Controller im selben Netzwerk
- **Beide Controller müssen dasselbe Passwort haben**

---

## Remote-Sensor anlegen

**Analog Sensor Konfiguration → Sensor hinzufügen:**

| Feld | Wert |
|------|------|
| **Typ** | Remote opensprinkler |
| **IP** | IP-Adresse des Remote-Controllers (z.B. `192.168.0.55`) |
| **Port** | Port des Remote-Controllers (Standard: `80`) |
| **ID** | Sensor-Nummer auf dem Remote-Controller |

---

## Anwendungsfall

**Beispiel:** Controller A (Hauptgarten) soll die Bodenfeuchtigkeit von Controller B (Nebengebäude) für seine Bewässerungsentscheidungen nutzen:

1. Auf Controller B: Bodenfeuchtesensor als Sensor Nr. 1 anlegen
2. Auf Controller A: Remote-Sensor anlegen mit IP=Controller B, ID=1
3. Auf Controller A: Programmanpassung oder Monitor mit dem Remote-Sensor konfigurieren

