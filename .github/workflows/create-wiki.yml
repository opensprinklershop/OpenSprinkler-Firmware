## Übersicht

Die Erweiterung ermöglicht:
- **Analoge Sensoren** (0–5V) über das ASB-Board
- **Modbus RS485-Sensoren** (Truebner SMT100, Aquaflex, TH100)
- **Virtuelle Sensoren**: MQTT, Remote, Wetterdaten, Gruppensenoren
- **Programmanpassungen** basierend auf Messwerten
- **Monitore** zum automatischen Starten/Stoppen von Programmen

---

## Unterstützte Hardware

### Analog Sensor Board (ASB) 1.0 und 1.1

- Bis zu **8 analoge Eingänge** (0–5V)
- Steckverbindung über Flachbandkabel an OpenSprinkler 3.x
- ASB 1.1: Verbesserter Rauschfilter, DIP-Schalter für Zweite-Boards-Betrieb
- Am OpenSprinkler 3.x: 1× ASB 1.0/1.1 oder 2× ASB 1.1

Anschluss der Sensoren (Stromversorgung):
- **5V** und **3,3V** Anschlüsse verfügbar
- Bei anderen Spannungen: GND immer mit anschließen

### Truebner RS485 Adapter

Ermöglicht bis zu **64 RS485-Modbus-Sensoren** (4 Master-Ports × 16 Sensoren):
- SMT100 RS485 Modbus
- Aquaflex RS485 Modbus
- TH100 RS485 Modbus (ab Firmware 2.3.3-173)

### Raspberry Pi (OSPi)

**PCF8591** (4 analoge Eingänge, 8bit) oder **ADS1115** (2×4 Eingänge, 16bit):

```bash
# I2C-Unterstützung aktivieren
sudo raspi-config  # → Interface Options → I2C
sudo apt install libmodbus-dev
```

USB RS485 Modbus Adapter: Gerätepfad in `/OpenSprinkler-Firmware/rs485` eintragen:
```
/dev/ttyUSB0
```

