Die **Analog Sensor API** erweitert OpenSprinkler um die Unterstützung von analogen und digitalen Sensoren über das **Analog Sensor Board (ASB)** sowie **Modbus RS485**-Sensoren.

> 📖 Originalquelle: [Analog Sensor API Doku (PDF)](https://osshop.b-cdn.net/wp-content/uploads/2025/02/Analog-Sensor-API-Doku.pdf)  
