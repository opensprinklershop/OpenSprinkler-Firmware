name: Create and Populate Wiki

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to create/overwrite wiki'
        required: true
        default: 'NO'

jobs:
  create-wiki:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'
    permissions:
      contents: write

    steps:
      - name: Checkout main repo (for docs)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Setup Git
        run: |
          git config --global user.name "Stefan Schmaltz"
          git config --global user.email "info@opensprinklershop.de"

      - name: Initialize Wiki Repository
        run: |
          mkdir wiki
          cd wiki
          git init
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"

      - name: Generate Wiki Pages
        run: |
          python3 << 'PYEOF'
          import os, shutil

          WIKI = "wiki"
          REPO = "repo"

          def w(filename, content):
              path = os.path.join(WIKI, filename)
              with open(path, 'w') as f:
                  f.write(content)
              print(f"  Created: {filename}")

          def read(path):
              try:
                  with open(path) as f:
                      return f.read()
              except:
                  return ""

          # ─────────────────────────────────────────────
          # HOME
          # ─────────────────────────────────────────────
          w("Home.md", """# OpenSprinkler Firmware — Wiki

