OpenSprinkler v3.x unterstützt Over-the-Air (OTA) Firmware-Updates direkt über die Web-Oberfläche.

---

## Vorbereitung

> ⚠️ **Konfiguration sichern** (Menü → Konfiguration exportieren) bevor ein Update durchgeführt wird!

> ⚠️ Bei **Hauptversion-Updates** (z.B. 2.2.0 → 2.2.1) wird ein Factory Reset durchgeführt und alle Einstellungen gelöscht.  
> Bei **Build-Updates** (z.B. 2.2.1(3) → 2.2.1(4)) bleiben alle Einstellungen erhalten.

---

## Update über die Web-Oberfläche

1. Neue Firmware-Datei von [opensprinklershop.de](https://opensprinklershop.de) herunterladen
2. Im Browser navigieren zu: `http://<controller-ip>/update`
3. Firmware-Datei auswählen
4. Passwort eingeben
5. **Submit** klicken
6. Update dauert ca. 20–40 Sekunden
7. Controller startet automatisch neu

**Nach dem Update:** Falls der Controller sich nicht mehr mit dem WLAN verbindet:
- Mit `OS_XXX` Netzwerk verbinden
- Auf `192.168.4.1` gehen
- WLAN-Passwort erneut eingeben

---

