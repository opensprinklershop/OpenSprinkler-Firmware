Der **MQTT-Sensor** liest Messwerte von einem MQTT-Broker und stellt sie in OpenSprinkler als Sensor-Werte zur Verfügung.

---

## Voraussetzungen

- Aktive MQTT-Verbindung (konfiguriert unter **Optionen → MQTT**)
- Ein MQTT-Broker im Netzwerk (z.B. Mosquitto)
- Ein Gerät, das Messwerte auf einem MQTT-Topic veröffentlicht

---

## MQTT-Verbindung einrichten

**Optionen → MQTT:**

| Feld | Beispiel |
|------|---------|
| Broker-IP | `192.168.0.100` |
| Port | `1883` |
| Benutzername | `mqtt_user` |
| Passwort | `mqtt_password` |
| Topic-Präfix | `opensprinkler` |

---

## MQTT-Sensor anlegen

**Analog Sensor Konfiguration → Sensor hinzufügen:**

1. **Typ:** MQTT subscription
2. **Name:** Frei wählbar (z.B. „Außentemperatur")
3. **MQTT Topic:** Das Topic, auf dem der Wert veröffentlicht wird  
   Beispiel: `garden/soil/moisture`
4. **MQTT Filter:** JSON-Pfad zum Wert (falls JSON-Payload)  
   Beispiel: `$.value` oder `$.temperature`

---

## MQTT-Payload-Formate

### Direkter Zahlenwert
```
Topic: garden/soil/moisture
Payload: 42.5
```

### JSON-Payload mit Filter
```
Topic: garden/sensors/outdoor
Payload: {"temperature": 22.3, "humidity": 65}
Filter: $.temperature
```

---

## Verwendung in Programmen

MQTT-Sensoren können genau wie physische Sensoren für:
- **Programmanpassungen** (Dauer skalieren)
- **Monitore** (Programm starten/stoppen bei Schwellenwert)

genutzt werden → Siehe [[Analog-Sensor-API]].

