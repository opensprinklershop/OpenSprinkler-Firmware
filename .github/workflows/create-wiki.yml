OpenSprinkler unterstützt bis zu **40 Programme** mit flexibler Zeitplanung.

---

## Programm erstellen

Unter **Programme → Neues Programm**:

### Programmdaten

| Feld | Beschreibung |
|------|-------------|
| **Name** | Beliebiger Programmname |
| **Aktiviert** | Programm ein/aus |
| **Wetterbeeinflussung** | Berücksichtigt Wasserstand / Wetterdaten |
| **Vorrang** | Regen- oder Sensor-Sperren ignorieren |

### Zeitplan-Typen

| Typ | Beschreibung |
|-----|-------------|
| **Wochentage** | Feste Wochentage (Mo, Di, Mi, ...) |
| **Gerade/Ungerade Tage** | Gerade oder ungerade Monatstage |
| **Intervall** | Alle N Tage |
| **Einmalig** | Genau ein Datum |
| **Monatstage** | Bestimmte Tage im Monat |

### Startzeiten

- Bis zu **4 feste Startzeiten** pro Programm
- **Wiederholungsstartzeiten**: Start + Intervall + Anzahl Wiederholungen
  - Beispiel: Start 08:30 Uhr, alle 15 Minuten, 4 Wiederholungen

### Zonendauern

- Pro Zone einstellbar: 0 s bis 18 h (**1-Sekunden-Genauigkeit**)
- Dauer 0 = Zone im Programm überspringen

---

## Sequentielle Zonengruppen

Zonen können in **Gruppen** eingeteilt werden:

| Gruppe | Verhalten |
|--------|-----------|
| **Sequential (S)** | Zonen laufen nacheinander |
| **Parallel (P)** | Zonen laufen gleichzeitig |
| **Gruppe 1–3** | Innerhalb einer Gruppe sequentiell, Gruppen parallel |

> Empfehlung: Nicht mehr als 4 Zonen gleichzeitig — abhängig von Transformator-Leistung.

---

## Einmaliges Programm (Run-Once)

Für spontane Bewässerung ohne gespeichertes Programm:
- Unter **Programme → Einmaliges Programm**
- Dauern pro Zone einstellen
- Sofort starten

---

## Wetter-basierte Anpassungen

Wenn Wetterdaten aktiv sind:

- **Wasserstand (%)**: Skaliert alle Programmdauern automatisch
  - 0% = kein Wasser, 100% = normale Dauer, 150% = 1,5× Dauer
- **Wettereinschränkungen**: Programm überspringen bei Frost, Regen oder Wind
- **Mehrtages-Mittelwert**: Für Programme mit Intervall > 1 Tag

---

## Protokollierung

Unter **Protokoll** werden alle Zonen-Läufe aufgezeichnet:
- Startzeit, Dauer, Zone, Programm-Auslöser
- Export als CSV möglich

