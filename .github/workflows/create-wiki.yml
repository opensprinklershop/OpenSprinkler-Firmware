## Wichtige Sicherheitshinweise

> ⚠️ **OpenSprinkler ist NICHT wasserdicht.** Für den Außenbereich ist ein wasserdichtes Gehäuse erforderlich.

> ⚠️ **AC-Modell (international):** Verwende einen 24VAC-Transformator, der dem Netzspannungsstandard deines Landes entspricht. Ein falscher Transformator kann das Gerät beschädigen.

---

## Anschlussdiagramm — Zonenverkabelung

Jedes Magnetventil hat **zwei Drähte**:

| Draht | Anschluss |
|-------|-----------|
| Gemeinsamer Draht (von allen Ventilen) | **COM** |
| Einzelner Ventildraht | **Zone 1, 2, 3, ...** |

**Regeln:**
- Alle Ventile teilen sich **einen COM-Draht** → an COM-Klemme (NICHT GND!)
- OpenSprinkler hat **zwei COM-Klemmen** (intern verbunden, beide verwendbar)
- Bei **polarisierten Ventilen** (DC/Latch): Plusdraht (rot) → COM, Minusdraht (schwarz) → Zone

---

## Schritt-für-Schritt Installation

### Schritt 1: Kabel beschriften und alten Controller abklemmen

Beschrifte alle Kabel sorgfältig:
- Stromkabel
- COM-Kabel (Common)
- Zonen-Kabel (1–8)
- ggf. Master-Zone / Pumpen-Relais-Kabel
- ggf. Sensor-Kabel (Regen, Boden, Durchfluss)

### Schritt 2: OpenSprinkler montieren und Kabel einstecken

Die grünen Klemmenblöcke sind **abnehmbar** — für einfachere Verkabelung vollständig abziehen und im abgezogenen Zustand verschrauben.

**AC-Modell (v3.4):** 24VAC-Transformator in den roten Stromanschluss einstecken.  
**AC-Modell (v3.0-3.3):** 24VAC-Kabel in den orangefarbenen Anschlussblock.  
**DC / LATCH-Modell:** DC-Adapter in den schwarzen Stromanschluss. COM = positiv (+).

**Sensor-Anschluss:**
- Signalkabel → SN1 und GND (oder SN2 für zweiten Sensor)
- ⚠️ Sensor-Signalkabel NICHT an COM anschließen!
- Sensor mit 24VAC-Bedarf: Stromkabel an COM und GND

### Schritt 3: Zonen-Erweiterungen anschließen (optional)

> Hauptcontroller ausschalten, bevor Expander angeschlossen werden!

**DIP-Schalter-Einstellungen:**

| Expander | DIP-Position |
|----------|-------------|
| 1. Expander | DOWN DOWN |
| 2. Expander | UP DOWN |
| 3. Expander | DOWN UP |
| 4. Expander | UP UP |

**Zonen-Zuordnung:**
- Hauptcontroller: Zonen 1–8
- 1. Expander (DOWN DOWN): Zonen 9–24
- 2. Expander (UP DOWN): Zonen 25–40
- usw.

### Schritt 4: WLAN oder Ethernet einrichten

Siehe [[Schnellstart]] und [[WLAN-Einrichtung]].

