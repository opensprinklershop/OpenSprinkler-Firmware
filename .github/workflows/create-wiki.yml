## Firmware-Installation

1. **Konfiguration sichern**: Menü → Konfiguration exportieren
2. Aktuelle Firmware von [opensprinklershop.de](https://opensprinklershop.de) herunterladen
3. Im Browser zu `http://<ip>/update` navigieren
4. Firmware auswählen, Passwort eingeben, Submit

Prüfen ob die Erweiterung aktiv ist:
- Im Menü rechts unten: **„Analog Sensor Konfiguration"** und **„Analoges Sensorprotokoll"** sichtbar?
- Falls nicht: UI-Quelle aktualisieren unter `http://<ip>/su`:
  ```
  UI source: https://ui.opensprinklershop.de/js
  ```

---

## Sensor anlegen

**Menü → Analog Sensor Konfiguration → Sensor hinzufügen**

Jeder Sensor hat:
- **Eindeutige Nummer** (> 0)
- **Name** (frei wählbar)
- **Typ** (aus der Typliste wählen)
- **IP/Port/ID** je nach Typ

---

## Sensor-Typen

### RS485 Modbus (Truebner)

| Typ | Messgröße |
|-----|-----------|
| SMT100 RS485 — moisture mode | Bodenfeuchtigkeit |
| SMT100 RS485 — temperature mode | Bodentemperatur |
| SMT100 RS485 — permittivity mode | Permittivität / Düngergehalt |
| TH100 RS485 — humidity mode | Luftfeuchtigkeit |
| TH100 RS485 — temperature mode | Temperatur |

**ID-Feld:** Modbus-Adresse des Sensors

### Analog Sensor Board (ASB)

| Typ | Messgröße |
|-----|-----------|
| ASB — voltage mode | Spannung in Volt |
| ASB — 0..3.3V to 0..100% | Spannung als Prozentwert |
| ASB — SMT50 moisture | Bodenfeuchtigkeit (SMT50) |
| ASB — SMT50 temperature | Bodentemperatur (SMT50) |
| ASB — SMT100-analog moisture | Bodenfeuchtigkeit (SMT100 analog) |
| ASB — SMT100-analog temperature | Bodentemperatur (SMT100 analog) |
| ASB — Vegetronix VH400 | Bodenfeuchtigkeit |
| ASB — Vegetronix THERM200 | Bodentemperatur |
| ASB — Vegetronix AquaPlumb | Füllstand in % |
| ASB — user defined sensor | Benutzerdefiniert |

**ID-Feld:** Anschluss-Nummer am ASB (0–7; ID=0 = Anschluss 9)

### Raspberry Pi OSPi

| Typ | Messgröße |
|-----|-----------|
| OSPi analog — voltage | Spannung 0..3.3V |
| OSPi analog — 0..3.3V to 0..100% | Spannung in % |
| OSPi analog — SMT50 moisture | Bodenfeuchtigkeit |
| OSPi analog — SMT50 temperature | Bodentemperatur |

### Virtuelle Sensoren

| Typ | Beschreibung |
|-----|-------------|
| **MQTT** | Wert aus einem MQTT-Topic auslesen |
| **Remote Sensor** | Sensor eines anderen OpenSprinklers |
| **Weather — temperature** | Temperatur aus Wetterdienst |
| **Weather — humidity** | Luftfeuchtigkeit aus Wetterdienst |
| **Weather — precipitation** | Niederschlag aus Wetterdienst |
| **Weather — wind** | Windgeschwindigkeit aus Wetterdienst |
| **Sensor Group** | Min/Max/Avg/Sum mehrerer Sensoren |
| **Free Memory** | Freier RAM (Diagnosezweck) |
| **Free Storage** | Freier Speicher (Diagnosezweck) |
| **FYTA Moisture** | Bodenfeuchtigkeit via FYTA Cloud |
| **FYTA Temperature** | Bodentemperatur via FYTA Cloud |

---

## Modbus-Adresse festlegen

Für RS485 Modbus Sensoren muss jeder Sensor eine eindeutige Adresse haben:

1. **Alle anderen Sensoren abklemmen** (nur der zu konfigurierende bleibt)
2. Gewünschte Adresse in das **ID**-Feld eintragen
3. Button **„Legen Sie die SMT100 Modbus ID fest"** drücken
4. Dialog bestätigen
5. Sensor mit wasserfestem Stift beschriften

---

## Programmanpassungen

Bewässerungsdauer automatisch basierend auf Sensorwerten anpassen:

**Menü → Sensor-Einstellungen → Programmanpassungen**

Konfigurierbar:
- Welcher Sensor
- Für welches Programm
- Anpassungs-Formel (linear, invers, ...)
- Min/Max-Grenzen

**Beispiel:** Bei Bodenfeuchtigkeit > 60% → Bewässerung auf 0% reduzieren.

---

## Monitore

Programme automatisch starten oder stoppen basierend auf Schwellenwerten:

**Menü → Sensor-Einstellungen → Monitore**

Konfigurierbar:
- Sensor und Schwellenwert
- Aktion: Programm starten / stoppen / Regenverzögerung setzen
- Ober- und Untergrenzen

**Beispiel:** Bewässerung starten wenn Bodenfeuchte unter 25% fällt.

---

## Sensor-Protokoll

**Menü → Analoges Sensorprotokoll**

- Verlauf aller Messwerte grafisch anzeigen
- Zeitraum wählbar
- Export möglich

