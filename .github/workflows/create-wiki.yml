OpenSprinkler unterstützt professionelle Bodensensoren von **Truebner** über die RS485 Modbus-Schnittstelle.

---

## Unterstützte Sensoren

| Sensor | Messwerte | Adapter |
|--------|----------|---------|
| **Truebner SMT100** | Bodenfeuchte, Bodentemperatur, Permittivität | Truebner RS485 Adapter oder USB-Modbus |
| **Truebner Aquaflex** | Bodenfeuchte, Bodentemperatur | Truebner RS485 Adapter oder USB-Modbus |
| **Truebner TH100** | Luftfeuchte, Temperatur | Truebner RS485 Adapter oder USB-Modbus |

> ⚠️ Nur **RS485 Modbus-Versionen** werden unterstützt (nicht RS485 ASCII).  
> Umschalten mit der Truebner Diagnosesoftware möglich.

---

## Hardware-Anschluss

### OpenSprinkler 3.x — Truebner RS485 Adapter

1. Flachbandkabel vom OpenSprinkler 3.x in den **Anschluss des RS485 Adapters** stecken
2. Sensoren am Adapter anschließen (beschriftete Klemmen)
3. **4 Master-Ports** verfügbar → je 16 Sensoren → max. **64 Sensoren** total

**Stromversorgung:** Strom wird nur während der Messung aktiviert (5V) — energieeffizient.

### Raspberry Pi (OSPi) — USB RS485 Adapter

1. USB RS485 Adapter anschließen
2. Gerätepfad ermitteln: `ls /dev/ttyUSB*`
3. Pfad in die Datei `rs485` im Firmware-Ordner eintragen:
   ```
   /dev/ttyUSB0
   ```
4. Paket installieren: `sudo apt install libmodbus-dev`

> 💡 Empfehlenswert: Adapter mit **Spannungsversorgung (+5V, GND)** an der Klemmleiste.

---

## Modbus-Adresse festlegen

Jeder angeschlossene Sensor **muss eine eindeutige Adresse** haben.

**Vorgehen:**
1. Alle anderen Sensoren abklemmen (nur den zu konfigurierenden angeschlossen lassen)
2. In **Analog Sensor Konfiguration** einen neuen Sensor anlegen (Typ: SMT100/TH100)
3. Gewünschte Adresse im **ID**-Feld eintragen
4. Button **„Legen Sie die SMT100 Modbus ID fest"** klicken
5. Dialog bestätigen
6. Sensor beschriften (wasserfester Stift empfohlen)
7. Nächsten Sensor anschließen und wiederholen

---

## Sensor konfigurieren

**Menü → Analog Sensor Konfiguration → Sensor hinzufügen**

| Feld | OpenSprinkler 3.x | OSPi (USB) |
|------|------------------|-----------|
| **IP** | Leer | Leer (oder IP für TCP/IP-Adapter) |
| **Port** | Leer | Device-Offset des USB-Adapters |
| **ID** | Modbus-Adresse | Modbus-Adresse |

---

## Verfügbare Messwerte

### SMT100 / Aquaflex

| Sensor-Typ | Einheit |
|------------|---------|
| moisture mode | % VWC (volumetrischer Wassergehalt) |
| temperature mode | °C |
| permittivity mode | — (Bodenleitfähigkeit / Düngergehalt) |

### TH100

| Sensor-Typ | Einheit |
|------------|---------|
| humidity mode | % rel. Luftfeuchtigkeit |
| temperature mode | °C |

---

## Mehrere Sensoren in einer Gruppe

Mit dem **Gruppensensor** können mehrere Sensoren kombiniert werden:

1. Einzelsensoren anlegen (mit jeweiliger Modbus-Adresse)
2. Bei jedem Einzelsensor: **Gruppe** = Nummer des Gruppensensors eintragen
3. Gruppensensor anlegen mit Typ: `Sensor group with min/max/avg/sum value`

> ⚠️ Nur Sensoren mit der **gleichen Einheit** gruppieren!

