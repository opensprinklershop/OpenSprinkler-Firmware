## Startseite

### Gerätestatus

Die Startseite zeigt:
- **Geräteuhr** (Datum/Uhrzeit)
- **Aktiver Wetterdienst** und aktueller Wasserstands-%-Wert
- **Regen-/Sensor-Status**
- **Zonen-Übersicht**: Welche Zonen aktuell aktiv sind

### Zonen-Attribute

Jede Zone kann mit folgenden Attributen konfiguriert werden:

| Attribut | Beschreibung |
|----------|-------------|
| **Name** | Frei wählbarer Zonenname |
| **Typ** | Standard, RF, Remote, HTTP, GPIO |
| **Master** | Als Master-Zone verwenden |
| **Regen ignorieren** | Läuft auch bei Regenverzögerung |
| **Sensor 1/2 ignorieren** | Ignoriert Sensor-Sperren |
| **Sequentiell** | Gruppe für sequentielle Ausführung |
| **Deaktiviert** | Zone dauerhaft deaktivieren |

---

## Menü-Funktionen

### Regenverzögerung
Verzögert alle Bewässerungen für eine einstellbare Dauer (in Stunden).

### Alle Zonen stoppen / Pause
- **Stoppen:** Alle aktiven Zonen sofort stoppen
- **Pause:** Aktive Läufe pausieren und nach Ablauf fortsetzen

### Manuelles Starten
Einzelne Zonen manuell starten mit frei wählbarer Dauer.

