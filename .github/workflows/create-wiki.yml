Ab Firmware 2.4.0 unterstützt die ESP32-Version ein **Online-Update** direkt aus der UI:

1. Menü → **System → Firmware-Update**
2. Verfügbare Versionen werden automatisch geladen
3. Gewünschte Version auswählen und bestätigen

