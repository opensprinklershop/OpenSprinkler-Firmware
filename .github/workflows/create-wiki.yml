> Das vollständige Handbuch findest du unter [[Installation]].

## Schritt 1: Ventile und Sensoren anschließen

- Magnetventile an **COM** und **Zone 1–8** anschließen.
- Bei Latch-Modellen: **Plus = COM**, Minus = Zone.
- Sensoren an **Sensor1/2** und **GND** anschließen.
- ⚠️ Die grünen Steckerleisten lassen sich vollständig abziehen – das erleichtert die Verkabelung.

## Schritt 2: Ersten Start / Access Point Modus

Beim ersten Start startet OpenSprinkler im **Access Point Modus**:

1. Ein neues WLAN mit der SSID **`OS_xxxxxxx`** erscheint in der Netzwerkliste.
2. Verbinde dein Smartphone oder Laptop mit diesem WLAN.
   > ⚠️ Bei Android erscheint der Hinweis „keine Internetverbindung" – wähle **Ja**, um verbunden zu bleiben.
3. Öffne deinen Browser und navigiere zu **`192.168.4.1`**.
4. Folge den Anweisungen: WLAN-SSID und Passwort deines Routers eingeben.

## Schritt 3: Verbindung prüfen

Nach erfolgreicher Einrichtung startet OpenSprinkler neu und verbindet sich mit deinem WLAN.

- Drücke **Taste B1** am Gerät → die zugewiesene **IP-Adresse** erscheint auf dem Display.
- Öffne `http://<ip-adresse>` im Browser oder in der OpenSprinkler-App.

**Standardpasswort:** `opendoor`

> 🔒 Ändere das Passwort nach der Einrichtung unter **Optionen → Passwort**.

## Schritt 4: App installieren

Installiere die App **„OpenSprinkler"** aus dem Play Store oder App Store.

## Schritt 5: WLAN-Reset (falls nötig)

Falls die Verbindung fehlschlägt oder das falsche WLAN-Passwort eingetragen wurde:

1. Drücke **B3 + B2** gleichzeitig → „Auf AP-Modus zurücksetzen?" erscheint.
2. Bestätige mit **B3**.
3. Führe Schritt 2 erneut aus.

> Tipp: Platziere den OpenSprinkler während der Einrichtung näher am WLAN-Router.

